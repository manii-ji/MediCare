<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediCare{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0B1F3A;
            --navy-light: #152B52;
            --teal: #0EA5A0;
            --teal-light: #E6F7F7;
            --coral: #E8614D;
            --slate: #F0F4F8;
            --slate-dark: #CBD5E1;
            --white: #FFFFFF;
            --text-primary: #0B1F3A;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 1px 3px rgba(11,31,58,0.08), 0 1px 2px rgba(11,31,58,0.06);
            --shadow-md: 0 4px 16px rgba(11,31,58,0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--slate);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* ---- SIDEBAR ---- */
        .sidebar {
            width: 240px;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--teal);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg { width: 20px; height: 20px; }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.3px;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--teal);
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .sidebar-nav {
            padding: 20px 0;
            flex: 1;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            padding: 0 24px;
            margin: 16px 0 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 24px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.06);
            color: var(--white);
        }

        .nav-link.active {
            background: rgba(14,165,160,0.12);
            color: var(--teal);
            border-left-color: var(--teal);
        }

        .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }

        .sidebar-user {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--teal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 11px;
            color: var(--teal);
            font-weight: 500;
        }

        .logout-btn {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: color 0.15s;
        }

        .logout-btn:hover { color: var(--coral); }
        .logout-btn svg { width: 16px; height: 16px; }

        /* ---- MAIN CONTENT ---- */
        .main {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .content {
            padding: 32px;
            flex: 1;
        }

        /* ---- CARDS ---- */
        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body { padding: 24px; }

        /* ---- STAT CARDS ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            border-left: 4px solid var(--teal);
        }

        .stat-card.coral { border-left-color: var(--coral); }
        .stat-card.amber { border-left-color: #F59E0B; }
        .stat-card.green { border-left-color: #10B981; }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.teal-bg { background: var(--teal-light); color: var(--teal); }
        .stat-icon.coral-bg { background: #FEF0EE; color: var(--coral); }
        .stat-icon.amber-bg { background: #FFFBEB; color: #F59E0B; }
        .stat-icon.green-bg { background: #ECFDF5; color: #10B981; }
        .stat-icon svg { width: 22px; height: 22px; }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }

        /* ---- STATUS BADGES ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .badge-pending { background: #FFFBEB; color: #B45309; }
        .badge-pending::before { background: #F59E0B; }

        .badge-confirmed { background: #ECFDF5; color: #065F46; }
        .badge-confirmed::before { background: #10B981; }

        .badge-cancelled { background: #FEF2F2; color: #991B1B; }
        .badge-cancelled::before { background: #EF4444; }

        /* ---- APPOINTMENT TABLE ---- */
        .appt-table { width: 100%; border-collapse: collapse; }

        .appt-table th {
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-light);
            padding: 12px 16px;
            background: var(--slate);
            border-bottom: 1px solid var(--border);
        }

        .appt-table th:first-child { border-radius: 8px 0 0 0; }
        .appt-table th:last-child { border-radius: 0 8px 0 0; }

        .appt-table td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .appt-table tr:last-child td { border-bottom: none; }
        .appt-table tr:hover td { background: #FAFBFC; }

        .doctor-cell { display: flex; flex-direction: column; }
        .doctor-name { font-weight: 600; font-size: 14px; }
        .doctor-spec { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* ---- BUTTONS ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--teal);
            color: var(--white);
        }

        .btn-primary:hover { background: #0C9490; }

        .btn-danger {
            background: #FEF2F2;
            color: var(--coral);
        }

        .btn-danger:hover { background: #FEE2E2; }

        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn svg { width: 16px; height: 16px; }

        /* ---- FORMS ---- */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 7px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--white);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(14,165,160,0.12);
        }

        .form-textarea { resize: vertical; min-height: 100px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error { background: #FEF2F2; color: #991B1B; border: 1px solid #FCA5A5; }
        .alert-success { background: #ECFDF5; color: #065F46; border: 1px solid #6EE7B7; }

        /* ---- DOCTORS GRID ---- */
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .doctor-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .doctor-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .doctor-card-top {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            padding: 28px 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .doctor-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            flex-shrink: 0;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .doctor-card-name { font-size: 15px; font-weight: 700; color: var(--white); }
        .doctor-card-spec { font-size: 12px; color: var(--teal); font-weight: 600; margin-top: 4px; }

        .doctor-card-body { padding: 20px 24px; }

        .doctor-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .doctor-detail svg { width: 15px; height: 15px; color: var(--teal); flex-shrink: 0; }

        .doctor-fee {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 16px 0 14px;
        }

        .doctor-fee span { font-size: 13px; font-weight: 400; color: var(--text-secondary); }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .empty-state svg { width: 52px; height: 52px; color: var(--slate-dark); margin-bottom: 16px; }
        .empty-state h3 { font-size: 17px; color: var(--text-primary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; margin-bottom: 20px; }

        /* ---- AUTH PAGES ---- */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--navy) 0%, #1A3A6E 50%, #0B2D55 100%);
            align-items: stretch;
            justify-content: stretch;
        }

        .auth-container {
            display: flex;
            width: 100%;
            height: 100vh;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
        }

        .auth-side {
            width: 42%;
            background: linear-gradient(160deg, var(--teal) 0%, #0C8A86 60%, #0B7A76 100%);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .auth-side::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            bottom: -80px; right: -80px;
        }

        .auth-side::after {
            content: '';
            position: absolute;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -40px; left: -40px;
        }

        .auth-brand { position: relative; z-index: 1; }
        .auth-brand-name { font-size: 26px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
        .auth-brand-tagline { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 8px; line-height: 1.5; }

        .auth-features { position: relative; z-index: 1; }
        .auth-feature { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
        .auth-feature-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .auth-feature-icon svg { width: 16px; height: 16px; color: var(--white); }
        .auth-feature-text { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.4; }
        .auth-feature-title { font-weight: 600; color: var(--white); margin-bottom: 3px; }

        .auth-form-side {
            flex: 1;
            background: var(--white);
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
        .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 30px; }
        .auth-switch { font-size: 14px; color: var(--text-secondary); margin-top: 20px; text-align: center; }
        .auth-switch a { color: var(--teal); font-weight: 600; text-decoration: none; }

        .form-submit {
            width: 100%;
            padding: 13px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .form-submit:hover { background: var(--navy-light); }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
